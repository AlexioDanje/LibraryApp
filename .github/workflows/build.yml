name: Build Library App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x
      
      - name: Restore dependencies
        run: dotnet restore LibraryApp.vbproj
      
      - name: Build
        run: dotnet build LibraryApp.vbproj --configuration Release --no-restore
      
      - name: Publish
        run: dotnet publish LibraryApp.vbproj --configuration Release --output ./publish
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibraryApp
          path: ./publish/**/*
